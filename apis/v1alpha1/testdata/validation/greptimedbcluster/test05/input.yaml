apiVersion: greptime.io/v1alpha1
kind: GreptimeDBCluster
metadata:
  name: test05
  namespace: default
spec:
  base:
    main:
      image: greptime/greptimedb:latest
  frontend:
    replicas: 1
  meta:
    backendStorage:
      etcd:
        endpoints:
          - etcd.etcd-cluster.svc.cluster.local:2379
    replicas: 1
  datanode:
    replicas: 3
  wal:
    kafka:
      brokerEndpoints:
        - "kafka-bootstrap.kafka.svc.cluster.local:9092"
      sasl:
        type: PLAIN
        username: greptime
        password: gt-operator-e2e
